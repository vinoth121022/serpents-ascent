<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snake &amp; Ladder — 3D Board</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0f1226; font-family: 'Segoe UI', system-ui, sans-serif; }
  #app { position: fixed; inset: 0; touch-action: none; }
  .hud {
    position: fixed; left: 16px; top: 16px; max-width: 280px;
    color: #e8e8f0; background: rgba(15, 18, 38, 0.72);
    border: 1px solid rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(6px); border-radius: 12px;
    padding: 14px 16px; line-height: 1.5; user-select: none; pointer-events: none;
  }
  .hud h1 { font-size: 16px; margin: 0 0 6px; }
  .hud .angles { font-variant-numeric: tabular-nums; font-size: 13px; color: #9fd3ff; white-space: pre; }
  .hud .hint { font-size: 12px; color: #aab; margin-top: 8px; }
  .btns { position: fixed; right: 16px; top: 16px; display: flex; gap: 8px; }
  .btns button {
    background: #2b3170; color: #fff; border: 1px solid rgba(255, 255, 255, 0.18);
    padding: 8px 14px; border-radius: 10px; cursor: pointer; font-size: 13px;
  }
  .btns button:hover { background: #3a41a0; }
  .btns button.active { background: #19a974; }
</style>
</head>
<body>
<div id="app"></div>

<div class="hud">
  <h1>🐍🪜 Snake &amp; Ladder — 3D Board</h1>
  <div class="angles" id="angles"></div>
  <div class="hint">
    Drag ↕ &nbsp;= X-axis spin (full 360°)<br/>
    Drag ↔ &nbsp;= Y-axis turn (limited to 180°)<br/>
    Scroll / pinch = zoom
  </div>
</div>

<div class="btns">
  <button id="autoBtn">Auto rotate</button>
  <button id="resetBtn">Reset view</button>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// ---------- Basic scene ----------
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f1226);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
let camDist = 17;
const camDir = new THREE.Vector3(0, 0.62, 1).normalize();
function placeCamera() {
  camera.position.copy(camDir).multiplyScalar(camDist);
  camera.lookAt(0, 0, 0);
}
placeCamera();

scene.add(new THREE.HemisphereLight(0xbfd4ff, 0x32230f, 0.55));
const sun = new THREE.DirectionalLight(0xffffff, 1.6);
sun.position.set(6, 14, 8);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -10; sun.shadow.camera.right = 10;
sun.shadow.camera.top = 10; sun.shadow.camera.bottom = -10;
sun.shadow.camera.far = 50;
scene.add(sun);

// ---------- Board group (everything rotates together) ----------
const board = new THREE.Group();
board.rotation.order = 'YXZ'; // pitch (X) inside, yaw (Y) outside — natural orbit feel
scene.add(board);

const TOP = 0.35; // y of the board's top surface

// Cell helpers: classic boustrophedon layout, 1 at bottom-left, 100 at top-left
function cellRC(n) {
  const r = Math.floor((n - 1) / 10);
  const k = (n - 1) % 10;
  const c = r % 2 === 0 ? k : 9 - k;
  return [r, c];
}
function cellCenter(n) {
  const [r, c] = cellRC(n);
  return new THREE.Vector3(c - 4.5, TOP, 4.5 - r);
}

// ---------- Board top texture (numbers drawn on a canvas) ----------
function makeBoardTexture() {
  const S = 1024, cs = S / 10;
  const cv = document.createElement('canvas');
  cv.width = cv.height = S;
  const ctx = cv.getContext('2d');
  for (let n = 1; n <= 100; n++) {
    const [r, c] = cellRC(n);
    const x = c * cs, y = (9 - r) * cs; // row 0 at canvas bottom = near edge in 3D
    let fill = (r + c) % 2 === 0 ? '#f6e7c8' : '#e3c08d';
    if (n === 1) fill = '#9fd68a';
    if (n === 100) fill = '#f2c84b';
    ctx.fillStyle = fill;
    ctx.fillRect(x, y, cs, cs);
    ctx.strokeStyle = 'rgba(90, 60, 20, 0.55)';
    ctx.lineWidth = 3;
    ctx.strokeRect(x, y, cs, cs);
    ctx.fillStyle = '#5a3a16';
    ctx.font = 'bold 36px Georgia';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(n), x + cs / 2, y + cs / 2);
  }
  const tex = new THREE.CanvasTexture(cv);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 8;
  return tex;
}

const wood = new THREE.MeshStandardMaterial({ color: 0x8a5a2b, roughness: 0.65 });
const topMat = new THREE.MeshStandardMaterial({ map: makeBoardTexture(), roughness: 0.55 });
const boardMesh = new THREE.Mesh(
  new THREE.BoxGeometry(10, 0.7, 10),
  [wood, wood, topMat, wood, wood, wood] // +x, -x, +y (top), -y, +z, -z
);
boardMesh.receiveShadow = true;
boardMesh.castShadow = true;
board.add(boardMesh);

// Picture-frame base under the board
const frame = new THREE.Mesh(
  new THREE.BoxGeometry(11.2, 0.6, 11.2),
  new THREE.MeshStandardMaterial({ color: 0x5d3a17, roughness: 0.7 })
);
frame.position.y = -0.15;
frame.receiveShadow = true;
frame.castShadow = true;
board.add(frame);

// ---------- 3D Ladders ----------
function makeLadder(from, to) {
  const a = cellCenter(from), b = cellCenter(to);
  a.y = b.y = TOP + 0.09;
  const dir = new THREE.Vector3().subVectors(b, a);
  const len = dir.length();
  const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);

  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color: 0xc98a3b, roughness: 0.5 });
  const railGeo = new THREE.CylinderGeometry(0.055, 0.055, len, 10);
  for (const off of [-0.2, 0.2]) {
    const rail = new THREE.Mesh(railGeo, mat);
    rail.rotation.x = Math.PI / 2; // lie along local Z
    rail.position.x = off;
    rail.castShadow = true;
    g.add(rail);
  }
  const nRungs = Math.max(3, Math.round(len / 0.55));
  const rungGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.42, 8);
  for (let i = 1; i < nRungs; i++) {
    const rung = new THREE.Mesh(rungGeo, mat);
    rung.rotation.z = Math.PI / 2; // across, along local X
    rung.position.z = -len / 2 + (len * i) / nRungs;
    rung.castShadow = true;
    g.add(rung);
  }
  g.position.copy(mid);
  g.rotation.y = Math.atan2(dir.x, dir.z);
  return g;
}

// ---------- 3D Snakes ----------
function makeSnake(head, tail, color) {
  const a = cellCenter(head), b = cellCenter(tail);
  const dir = new THREE.Vector3().subVectors(b, a);
  const perp = new THREE.Vector3(-dir.z, 0, dir.x).normalize();

  const N = 5;
  const pts = [];
  for (let i = 0; i <= N; i++) {
    const t = i / N;
    const p = new THREE.Vector3().lerpVectors(a, b, t);
    const sway = i === 0 || i === N ? 0 : Math.sin(t * Math.PI * 2.5) * 0.45;
    p.addScaledVector(perp, sway);
    p.y = TOP + 0.13 + Math.sin(t * Math.PI) * 0.16;
    pts.push(p);
  }
  const curve = new THREE.CatmullRomCurve3(pts);
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.35 });

  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.TubeGeometry(curve, 80, 0.13, 12), mat);
  body.castShadow = true;
  g.add(body);

  const headBall = new THREE.Mesh(new THREE.SphereGeometry(0.22, 18, 18), mat);
  headBall.position.copy(pts[0]);
  headBall.castShadow = true;
  g.add(headBall);

  const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2 });
  const eyePerp = perp.clone().multiplyScalar(0.1);
  for (const s of [1, -1]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.05, 10, 10), eyeMat);
    eye.position.copy(pts[0]).addScaledVector(eyePerp, s);
    eye.position.y += 0.14;
    g.add(eye);
  }

  const tip = new THREE.Mesh(new THREE.SphereGeometry(0.1, 12, 12), mat);
  tip.position.copy(pts[N]);
  g.add(tip);
  return g;
}

// Classic positions — ladders go up, snakes slide down
const LADDERS = [[4, 14], [9, 31], [21, 42], [28, 84], [51, 67], [80, 100]];
const SNAKES = [[16, 6], [47, 26], [62, 19], [87, 24], [93, 73], [98, 78]];
const SNAKE_COLORS = [0x2e8b57, 0x8e44ad, 0xc0392b, 0x16a085, 0xd35400, 0x2c3e50];

for (const [from, to] of LADDERS) board.add(makeLadder(from, to));
SNAKES.forEach(([head, tail], i) => board.add(makeSnake(head, tail, SNAKE_COLORS[i])));

// ---------- Rotation controls ----------
// X axis: free, full 360°. Y axis: clamped to ±90° (180° total range).
const Y_LIMIT = Math.PI / 2;
let targetX = 0.45, targetY = 0; // slight initial tilt so the board reads nicely
let autoRotate = false;

const pointers = new Map();
let lastPinch = 0;

renderer.domElement.addEventListener('pointerdown', (e) => {
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  renderer.domElement.setPointerCapture(e.pointerId);
});
renderer.domElement.addEventListener('pointermove', (e) => {
  if (!pointers.has(e.pointerId)) return;
  const prev = pointers.get(e.pointerId);
  const dx = e.clientX - prev.x, dy = e.clientY - prev.y;
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (pointers.size === 1) {
    targetX += dy * 0.008;                               // vertical drag → X axis, unbounded (360°)
    targetY = clamp(targetY + dx * 0.008, -Y_LIMIT, Y_LIMIT); // horizontal drag → Y axis, 180° range
  } else if (pointers.size === 2) {
    const [p1, p2] = [...pointers.values()];
    const pinch = Math.hypot(p1.x - p2.x, p1.y - p2.y);
    if (lastPinch > 0) camDist = clamp(camDist - (pinch - lastPinch) * 0.04, 9, 30);
    lastPinch = pinch;
  }
});
const endPointer = (e) => { pointers.delete(e.pointerId); lastPinch = 0; };
renderer.domElement.addEventListener('pointerup', endPointer);
renderer.domElement.addEventListener('pointercancel', endPointer);

renderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  camDist = clamp(camDist + e.deltaY * 0.012, 9, 30);
}, { passive: false });

function clamp(v, lo, hi) { return Math.min(hi, Math.max(lo, v)); }

// ---------- UI ----------
const anglesEl = document.getElementById('angles');
const autoBtn = document.getElementById('autoBtn');
const resetBtn = document.getElementById('resetBtn');
autoBtn.addEventListener('click', () => {
  autoRotate = !autoRotate;
  autoBtn.classList.toggle('active', autoRotate);
});
resetBtn.addEventListener('click', () => {
  targetX = 0.45; targetY = 0; camDist = 17;
  autoRotate = false;
  autoBtn.classList.remove('active');
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- Render loop ----------
function animate() {
  requestAnimationFrame(animate);
  if (autoRotate) targetX += 0.006; // demonstrates the full 360° X spin

  // smooth damping toward target rotation
  board.rotation.x += (targetX - board.rotation.x) * 0.12;
  board.rotation.y += (targetY - board.rotation.y) * 0.12;
  placeCamera();

  const degX = ((board.rotation.x % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2) * 180 / Math.PI;
  const degY = board.rotation.y * 180 / Math.PI;
  anglesEl.textContent = `X axis: ${degX.toFixed(0).padStart(3)}°  (0–360°)\nY axis: ${degY >= 0 ? '+' : ''}${degY.toFixed(0)}°  (−90° to +90°)`;

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
